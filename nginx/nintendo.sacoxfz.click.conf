# Cấu hình Nginx cho Web Server thứ 3: Nintendo Collection (192.168.1.42)
# Thêm block này vào file config Nginx trên máy 192.168.1.35
# Đường dẫn thường là: /etc/nginx/sites-available/nintendo.sacoxfz.click

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name nintendo.sacoxfz.click;
    return 301 https://$host$request_uri;
}

# HTTPS - Proxy về Nintendo Collection App
server {
    listen 443 ssl;
    server_name nintendo.sacoxfz.click;

    # Dùng chung Wildcard cert với các site khác
    ssl_certificate     /etc/letsencrypt/live/sacoxfz.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sacoxfz.click/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://192.168.1.42:8080;  # App chạy port 8080

        # Header để app nhận đúng IP thật của client
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
